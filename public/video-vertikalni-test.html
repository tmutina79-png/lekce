<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test svislou přímkou – Vizualizace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{border-radius:16px;box-shadow:0 0 60px rgba(59,130,246,.2)}
#phase{color:#60a5fa;font-size:15px;margin-top:10px;font-weight:600;min-height:22px}
#title{color:#e2e8f0;font-size:22px;font-weight:700;margin-bottom:14px;letter-spacing:1px}
#info{color:#94a3b8;font-size:13px;margin-top:8px;text-align:center;max-width:700px}

/* ── Timeline & Controls ── */
#controls-wrap{margin-top:14px;width:800px;display:flex;flex-direction:column;gap:8px}

/* Time bar row */
#time-row{display:flex;align-items:center;gap:10px}
#time-left,#time-right{color:#94a3b8;font-size:12px;font-variant-numeric:tabular-nums;min-width:46px;text-align:center;user-select:none}
#timeline-wrap{position:relative;flex:1;height:28px;cursor:pointer;display:flex;align-items:center}
#timeline-bg{position:absolute;width:100%;height:6px;border-radius:3px;background:#1e293b}
#timeline-fill{position:absolute;height:6px;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#60a5fa);pointer-events:none}
#timeline-thumb{position:absolute;width:16px;height:16px;border-radius:50%;background:#60a5fa;border:2px solid #0f172a;transform:translateX(-50%);pointer-events:none;box-shadow:0 0 6px rgba(96,165,250,.5)}
.phase-marker{position:absolute;width:2px;height:12px;background:#475569;top:8px;transform:translateX(-50%);pointer-events:none;border-radius:1px}

/* Button row */
#btn-row{display:flex;align-items:center;justify-content:center;gap:8px}
#btn-row button{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:6px 14px;font-size:14px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;font-family:inherit;display:flex;align-items:center;gap:5px;user-select:none}
#btn-row button:hover{background:#334155;border-color:#60a5fa}
#btn-row button:active{background:#475569;transform:scale(0.96)}
#btn-row button .icon{font-size:16px}
#btn-row button.primary{background:#1e3a5f;border-color:#3b82f6}
#btn-row button.primary:hover{background:#2563eb;border-color:#60a5fa}
#speed-badge{color:#64748b;font-size:11px;margin-left:auto;user-select:none;background:#1e293b;padding:3px 8px;border-radius:6px;border:1px solid #334155}
</style>
</head>
<body>
<div id="title">📏 Test svislou přímkou</div>
<canvas id="c" width="800" height="500"></canvas>
<div id="phase"></div>

<div id="controls-wrap">
  <div id="time-row">
    <span id="time-left">0:00.0</span>
    <div id="timeline-wrap">
      <div id="timeline-bg"></div>
      <div id="timeline-fill"></div>
      <div id="timeline-thumb"></div>
    </div>
    <span id="time-right">0:48.0</span>
  </div>
  <div id="btn-row">
    <button id="btnStart" title="Na začátek"><span class="icon">⏮</span></button>
    <button id="btnRew" title="Zpět 0,3 s"><span class="icon">◀</span> 0,3s</button>
    <button id="btnPlay" class="primary" title="Přehrát / Zastavit"><span class="icon" id="playIcon">⏸</span> <span id="playLabel">Pauza</span></button>
    <button id="btnFwd" title="Vpřed 0,3 s">0,3s <span class="icon">▶</span></button>
    <button id="btnEnd" title="Na konec"><span class="icon">⏭</span></button>
    <span id="speed-badge">1×</span>
  </div>
</div>

<div id="info">Svislá přímka prochází grafem — pokud protne křivku vždy nejvýše v jednom bodě, je to funkce.</div>

<script>
const C=document.getElementById('c'), X=C.getContext('2d');
const W=C.width, H=C.height;

const DUR=48000;
const STEP=300;
let currentTime=0, playing=true, lastTs=null;
let scrubbing=false;
let playbackRate=1;

const phases=[
  {t:0,     label:"\u2460 Pravidlo: svisl\u00e1 p\u0159\u00edmka protne graf nejv\u00fd\u0161e v jednom bod\u011b"},
  {t:8000,  label:"\u2461 Parabola f(x) = x\u00b2 \u2014 test svislou p\u0159\u00edmkou"},
  {t:18000, label:"\u2462 Line\u00e1rn\u00ed funkce f(x) = 2x \u2212 1 \u2014 test svislou p\u0159\u00edmkou"},
  {t:28000, label:"\u2463 Kru\u017enice x\u00b2 + y\u00b2 = 9 \u2014 NEN\u00cd funkce!"},
  {t:38000, label:"\u2464 Kubick\u00e1 funkce f(x) = x\u00b3/4 \u2014 test svislou p\u0159\u00edmkou"},
];
function getPhase(t){let p=phases[0].label;for(const ph of phases)if(t>=ph.t)p=ph.label;return p}

const btnPlay=document.getElementById('btnPlay');
const btnRew=document.getElementById('btnRew');
const btnFwd=document.getElementById('btnFwd');
const btnStart=document.getElementById('btnStart');
const btnEnd=document.getElementById('btnEnd');
const playIcon=document.getElementById('playIcon');
const playLabel=document.getElementById('playLabel');
const timeLeft=document.getElementById('time-left');
const timeRight=document.getElementById('time-right');
const timelineWrap=document.getElementById('timeline-wrap');
const timelineFill=document.getElementById('timeline-fill');
const timelineThumb=document.getElementById('timeline-thumb');
const speedBadge=document.getElementById('speed-badge');

phases.forEach(ph=>{
  if(ph.t===0) return;
  const m=document.createElement('div');
  m.className='phase-marker';
  m.style.left=(ph.t/DUR*100)+'%';
  timelineWrap.appendChild(m);
});

function fmt(ms){
  const s=Math.max(0,ms/1000);
  const m=Math.floor(s/60);
  const sec=s-m*60;
  return m+':'+sec.toFixed(1).padStart(4,'0');
}

btnPlay.addEventListener('click',()=>{
  playing=!playing;
  playIcon.textContent=playing?'\u23F8':'\u25B6';
  playLabel.textContent=playing?'Pauza':'P\u0159ehr\u00e1t';
  if(playing) lastTs=null;
});
btnRew.addEventListener('click',()=>{currentTime=Math.max(0,currentTime-STEP);updateTimeline();});
btnFwd.addEventListener('click',()=>{currentTime=Math.min(DUR,currentTime+STEP);updateTimeline();});
btnStart.addEventListener('click',()=>{currentTime=0;updateTimeline();});
btnEnd.addEventListener('click',()=>{currentTime=DUR;updateTimeline();playing=false;playIcon.textContent='\u25B6';playLabel.textContent='P\u0159ehr\u00e1t';});

function getTimeFromEvent(e){
  const rect=timelineWrap.getBoundingClientRect();
  const x=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  return x*DUR;
}
timelineWrap.addEventListener('mousedown',(e)=>{scrubbing=true;currentTime=getTimeFromEvent(e);updateTimeline();});
document.addEventListener('mousemove',(e)=>{if(!scrubbing)return;currentTime=getTimeFromEvent(e);updateTimeline();});
document.addEventListener('mouseup',()=>{scrubbing=false;});

document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();btnPlay.click();}
  if(e.code==='ArrowLeft'){e.preventDefault();btnRew.click();}
  if(e.code==='ArrowRight'){e.preventDefault();btnFwd.click();}
  if(e.code==='Home'){e.preventDefault();btnStart.click();}
  if(e.code==='End'){e.preventDefault();btnEnd.click();}
  if(e.key==='+'||e.key==='='){playbackRate=Math.min(3,playbackRate+0.25);speedBadge.textContent=playbackRate+'\u00d7';}
  if(e.key==='-'){playbackRate=Math.max(0.25,playbackRate-0.25);speedBadge.textContent=playbackRate+'\u00d7';}
});

function updateTimeline(){
  const pct=(currentTime/DUR*100);
  timelineFill.style.width=pct+'%';
  timelineThumb.style.left=pct+'%';
  timeLeft.textContent=fmt(currentTime);
  timeRight.textContent=fmt(DUR);
}

function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t))}
function easeOut(t){return 1-Math.pow(1-Math.max(0,Math.min(1,t)),3)}
function easeInOut(t){t=Math.max(0,Math.min(1,t));return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2}

function drawAxes(cx,cy,hw,hh,scale,alpha){
  X.save();X.globalAlpha=alpha;
  X.strokeStyle='#1e293b';X.lineWidth=1;
  for(let i=-10;i<=10;i++){
    const px=cx+i*scale;
    if(px>cx-hw&&px<cx+hw){X.beginPath();X.moveTo(px,cy-hh);X.lineTo(px,cy+hh);X.stroke();}
    const py=cy-i*scale;
    if(py>cy-hh&&py<cy+hh){X.beginPath();X.moveTo(cx-hw,py);X.lineTo(cx+hw,py);X.stroke();}
  }
  X.strokeStyle='#475569';X.lineWidth=2;
  X.beginPath();X.moveTo(cx-hw,cy);X.lineTo(cx+hw,cy);X.stroke();
  X.beginPath();X.moveTo(cx,cy-hh);X.lineTo(cx,cy+hh);X.stroke();
  X.fillStyle='#475569';
  X.beginPath();X.moveTo(cx+hw,cy);X.lineTo(cx+hw-8,cy-4);X.lineTo(cx+hw-8,cy+4);X.fill();
  X.beginPath();X.moveTo(cx,cy-hh);X.lineTo(cx-4,cy-hh+8);X.lineTo(cx+4,cy-hh+8);X.fill();
  X.font='bold 13px "Segoe UI",sans-serif';X.fillStyle='#64748b';
  X.textAlign='left';X.fillText('x',cx+hw+4,cy-4);
  X.textAlign='center';X.fillText('y',cx+8,cy-hh-4);
  X.restore();
}

function drawCurveParam(fn,tMin,tMax,cx,cy,scale,color,width,prog){
  const steps=300;
  const drawSteps=Math.floor(steps*Math.min(1,prog));
  if(drawSteps<2)return;
  X.strokeStyle=color;X.lineWidth=width;
  X.beginPath();let first=true;
  for(let i=0;i<=drawSteps;i++){
    const tv=tMin+(tMax-tMin)*i/steps;
    const[xv,yv]=fn(tv);
    const px=cx+xv*scale,py=cy-yv*scale;
    if(first){X.moveTo(px,py);first=false}else X.lineTo(px,py);
  }
  X.stroke();
}

function drawVerticalTest(cx,cy,hw,hh,scale,fn,tMin,tMax,sweepT,color,isFunc){
  const xRange=hw/scale;
  const xPos=-xRange+sweepT*2*xRange;
  const lineX=cx+xPos*scale;
  X.save();
  X.strokeStyle='rgba(251,191,36,0.8)';X.lineWidth=2.5;X.setLineDash([8,5]);
  X.beginPath();X.moveTo(lineX,cy-hh+10);X.lineTo(lineX,cy+hh-10);X.stroke();
  X.setLineDash([]);
  const intersections=[];
  const steps=1000;
  for(let i=0;i<steps;i++){
    const tv=tMin+(tMax-tMin)*i/steps;
    const tvNext=tMin+(tMax-tMin)*(i+1)/steps;
    const[x1,y1]=fn(tv);const[x2,y2]=fn(tvNext);
    if((x1-xPos)*(x2-xPos)<=0&&Math.abs(x2-x1)>0.001){
      const frac=(xPos-x1)/(x2-x1);
      intersections.push(y1+frac*(y2-y1));
    }
  }
  for(const yI of intersections){
    const py=cy-yI*scale;
    if(py>cy-hh&&py<cy+hh){
      X.fillStyle=intersections.length>1?'#ef4444':'#22c55e';
      X.beginPath();X.arc(lineX,py,6,0,Math.PI*2);X.fill();
      X.fillStyle='#fff';
      X.beginPath();X.arc(lineX,py,3,0,Math.PI*2);X.fill();
    }
  }
  if(intersections.length>0){
    const topY=Math.min(...intersections.map(y=>cy-y*scale));
    X.font='bold 13px "Segoe UI",sans-serif';X.textAlign='center';
    if(intersections.length===1){X.fillStyle='#22c55e';X.fillText('1 bod \u2713',lineX,topY-14);}
    else{X.fillStyle='#ef4444';X.fillText(intersections.length+' body \u2717',lineX,topY-14);}
  }
  X.restore();
}

function drawIntro(prog){
  const alpha=easeOut(prog*2);
  X.globalAlpha=alpha;
  X.font='bold 28px "Segoe UI",sans-serif';
  X.fillStyle='#e2e8f0';X.textAlign='center';
  X.fillText('Jak poznat graf funkce?',W/2,80);
  const boxW=600,boxH=70,bx=(W-boxW)/2,by=110;
  X.fillStyle='#1e293b';X.strokeStyle='#3b82f6';X.lineWidth=2;
  roundRect(bx,by,boxW,boxH,14);
  X.font='18px "Segoe UI",sans-serif';
  X.fillStyle='#93c5fd';X.textAlign='center';
  X.fillText('Pravidlo: Ka\u017ed\u00e1 svisl\u00e1 p\u0159\u00edmka protne graf',W/2,by+30);
  X.fillStyle='#fbbf24';X.font='bold 18px "Segoe UI",sans-serif';
  X.fillText('nejv\u00fd\u0161e v jednom bod\u011b.',W/2,by+55);

  const ilAlpha=easeOut((prog-0.25)*2.5);
  X.globalAlpha=ilAlpha*alpha;

  const lx=230,ly=320;
  X.strokeStyle='#334155';X.lineWidth=1;
  X.beginPath();X.moveTo(lx-120,ly);X.lineTo(lx+120,ly);X.stroke();
  X.beginPath();X.moveTo(lx,ly+60);X.lineTo(lx,ly-80);X.stroke();
  X.strokeStyle='#3b82f6';X.lineWidth=3;
  X.beginPath();
  for(let i=-110;i<=110;i++){
    const xv=i/110,yv=Math.sin(xv*3)*0.6+xv*0.3;
    const px=lx+i,py=ly-yv*50;
    if(i===-110)X.moveTo(px,py);else X.lineTo(px,py);
  }
  X.stroke();

  const sweep=(prog*1.2)%1;
  const vlx=lx-100+sweep*200;
  X.strokeStyle='rgba(251,191,36,0.7)';X.lineWidth=2;X.setLineDash([6,4]);
  X.beginPath();X.moveTo(vlx,ly-75);X.lineTo(vlx,ly+55);X.stroke();
  X.setLineDash([]);
  const xn=(vlx-lx)/110,yn=Math.sin(xn*3)*0.6+xn*0.3;
  X.fillStyle='#22c55e';
  X.beginPath();X.arc(vlx,ly-yn*50,5,0,Math.PI*2);X.fill();
  X.font='bold 16px "Segoe UI",sans-serif';X.fillStyle='#22c55e';X.textAlign='center';
  X.fillText('\u2713 Funkce',lx,ly+95);
  X.font='13px "Segoe UI",sans-serif';X.fillStyle='#94a3b8';
  X.fillText('V\u017edy max 1 pr\u016fse\u010d\u00edk',lx,ly+115);

  const rx=570,ry=320,rad=55;
  X.strokeStyle='#334155';X.lineWidth=1;
  X.beginPath();X.moveTo(rx-120,ry);X.lineTo(rx+120,ry);X.stroke();
  X.beginPath();X.moveTo(rx,ry+70);X.lineTo(rx,ry-80);X.stroke();
  X.strokeStyle='#ef4444';X.lineWidth=3;
  X.beginPath();X.arc(rx,ry,rad,0,Math.PI*2);X.stroke();
  const vlx2=rx-80+sweep*160;
  X.strokeStyle='rgba(251,191,36,0.7)';X.lineWidth=2;X.setLineDash([6,4]);
  X.beginPath();X.moveTo(vlx2,ry-75);X.lineTo(vlx2,ry+70);X.stroke();
  X.setLineDash([]);
  const dx2=vlx2-rx;
  if(Math.abs(dx2)<rad){
    const dy2=Math.sqrt(rad*rad-dx2*dx2);
    X.fillStyle='#ef4444';
    X.beginPath();X.arc(vlx2,ry-dy2,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(vlx2,ry+dy2,5,0,Math.PI*2);X.fill();
  }
  X.font='bold 16px "Segoe UI",sans-serif';X.fillStyle='#ef4444';X.textAlign='center';
  X.fillText('\u2717 Nen\u00ed funkce',rx,ry+95);
  X.font='13px "Segoe UI",sans-serif';X.fillStyle='#94a3b8';
  X.fillText('N\u011bkdy 2 pr\u016fse\u010d\u00edky',rx,ry+115);
  X.globalAlpha=1;
}

function drawTestScene(cx,cy,hw,hh,scale,fn,tMin,tMax,curveName,formula,color,prog,isFunc){
  const drawProg=easeOut(Math.min(1,prog*2.8));
  const sweepProg=Math.max(0,(prog-0.25)/0.55);
  X.save();
  X.beginPath();X.rect(cx-hw-20,cy-hh-40,2*hw+40,2*hh+100);X.clip();
  drawAxes(cx,cy,hw,hh,scale,easeOut(prog*2.5));
  drawCurveParam(fn,tMin,tMax,cx,cy,scale,color,3,drawProg);
  if(sweepProg>0){
    const sweep=easeInOut(Math.min(1,sweepProg*1.2));
    drawVerticalTest(cx,cy,hw,hh,scale,fn,tMin,tMax,sweep,color,isFunc);
  }
  const labelAlpha=easeOut(prog*2.5);
  X.globalAlpha=labelAlpha;
  X.font='bold 16px "Segoe UI",sans-serif';X.textAlign='center';
  X.fillStyle=isFunc?'#22c55e':'#ef4444';
  X.fillText(isFunc?'\u2713 JE funkce':'\u2717 NEN\u00cd funkce',cx,cy+hh+25);
  X.font='15px "Segoe UI",sans-serif';X.fillStyle=color;
  X.fillText(formula,cx,cy+hh+48);
  X.font='bold 14px "Segoe UI",sans-serif';X.fillStyle='#e2e8f0';
  X.fillText(curveName,cx,cy-hh-15);
  X.restore();X.globalAlpha=1;
}

function roundRect(x,y,w,h,r){
  X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);
  X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();X.fill();X.stroke();
}

function frame(ts){
  if(lastTs===null)lastTs=ts;
  const dt=(ts-lastTs)*playbackRate;
  lastTs=ts;
  if(playing&&!scrubbing)currentTime=Math.min(DUR,currentTime+dt);
  const t=currentTime;
  if(!scrubbing)updateTimeline();

  X.fillStyle='#0a0e1a';X.fillRect(0,0,W,H);

  if(t<8000){
    drawIntro(t/8000);
  } else if(t<18000){
    drawTestScene(W/2,H/2-20,300,180,45,(tv)=>[tv,tv*tv],-3.5,3.5,'Parabola','f(x) = x\u00b2','#3b82f6',(t-8000)/10000,true);
  } else if(t<28000){
    drawTestScene(W/2,H/2-20,300,180,45,(tv)=>[tv,2*tv-1],-4,4,'Line\u00e1rn\u00ed funkce','f(x) = 2x \u2212 1','#22c55e',(t-18000)/10000,true);
  } else if(t<38000){
    drawTestScene(W/2,H/2-20,300,180,45,(tv)=>[3*Math.cos(tv),3*Math.sin(tv)],0,Math.PI*2,'Kru\u017enice','x\u00b2 + y\u00b2 = 9','#ef4444',(t-28000)/10000,false);
  } else {
    drawTestScene(W/2,H/2-20,300,180,45,(tv)=>[tv,tv*tv*tv/4],-3.5,3.5,'Kubick\u00e1 funkce','f(x) = x\u00b3/4','#a855f7',(t-38000)/10000,true);
  }

  document.getElementById('phase').textContent=getPhase(t);

  if(t>=DUR&&playing){currentTime=0;lastTs=null;}
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
