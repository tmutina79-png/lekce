<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="liquidA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="liquidB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="liquidC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="400" height="225" fill="url(#sBg)"/>

  <!-- Kádinka A (vlevo) -->
  <g transform="translate(50, 45)">
    <path d="M10,0 L10,90 Q10,100 20,100 L60,100 Q70,100 70,90 L70,0" fill="none" stroke="#f97316" stroke-width="2"/>
    <rect x="12" y="35" width="56" height="63" rx="2" fill="url(#liquidA)"/>
    <text x="40" y="70" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">40%</text>
    <text x="40" y="-8" font-family="sans-serif" font-size="12" fill="#f97316" text-anchor="middle" font-weight="bold">Roztok A</text>
    <text x="40" y="118" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">200 ml</text>
  </g>

  <!-- Plus -->
  <text x="165" y="105" font-family="sans-serif" font-size="30" fill="#64748b" text-anchor="middle">+</text>

  <!-- Kádinka B (uprostřed) -->
  <g transform="translate(185, 45)">
    <path d="M10,0 L10,90 Q10,100 20,100 L60,100 Q70,100 70,90 L70,0" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <rect x="12" y="50" width="56" height="48" rx="2" fill="url(#liquidB)"/>
    <text x="40" y="80" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">10%</text>
    <text x="40" y="-8" font-family="sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">Roztok B</text>
    <text x="40" y="118" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">300 ml</text>
  </g>

  <!-- Šipka -->
  <text x="300" y="105" font-family="sans-serif" font-size="26" fill="#64748b" text-anchor="middle">=</text>

  <!-- Kádinka C (výsledná směs) -->
  <g transform="translate(315, 45)">
    <path d="M10,0 L10,90 Q10,100 20,100 L60,100 Q70,100 70,90 L70,0" fill="none" stroke="#a855f7" stroke-width="2"/>
    <rect x="12" y="20" width="56" height="78" rx="2" fill="url(#liquidC)"/>
    <text x="40" y="65" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">22%</text>
    <text x="40" y="-8" font-family="sans-serif" font-size="12" fill="#a855f7" text-anchor="middle" font-weight="bold">Směs</text>
    <text x="40" y="118" font-family="sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">500 ml</text>
  </g>

  <!-- Nadpis -->
  <text x="200" y="22" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">🧪 Vizualizace vzniku směsi</text>

  <!-- Vzorec -->
  <rect x="90" y="188" width="220" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="207" font-family="Georgia, serif" font-size="12" fill="#c4b5fd" text-anchor="middle">m₁·c₁ + m₂·c₂ = (m₁+m₂)·c</text>

  <!-- Video badge -->
  <rect x="15" y="192" width="65" height="24" rx="6" fill="#a855f7"/>
  <polygon points="27,199 27,211 37,205" fill="#fff"/>
  <text x="55" y="209" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
