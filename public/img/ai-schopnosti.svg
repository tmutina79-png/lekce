<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="760" height="380" rx="16" fill="#f8fafc"/>

  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#312e81">Co AI umí a co neumí?</text>

  <!-- Left: umí -->
  <g transform="translate(30,60)">
    <rect width="340" height="280" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="170" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">✅ AI umí</text>

    <g transform="translate(20,50)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1"/>
      <text x="15" y="25" font-size="20">👁️</text>
      <text x="45" y="25" font-size="12" fill="#166534">Rozpoznat obličeje na fotkách</text>
    </g>
    <g transform="translate(20,96)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1"/>
      <text x="15" y="25" font-size="20">👂</text>
      <text x="45" y="25" font-size="12" fill="#166534">Převést řeč na text (Siri)</text>
    </g>
    <g transform="translate(20,142)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1"/>
      <text x="15" y="25" font-size="20">💬</text>
      <text x="45" y="25" font-size="12" fill="#166534">Generovat text (ChatGPT)</text>
    </g>
    <g transform="translate(20,188)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1"/>
      <text x="15" y="25" font-size="20">🎨</text>
      <text x="45" y="25" font-size="12" fill="#166534">Vytvořit obrázek z popisu</text>
    </g>
    <g transform="translate(20,234)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#bbf7d0" stroke-width="1"/>
      <text x="15" y="25" font-size="20">🎮</text>
      <text x="45" y="25" font-size="12" fill="#166534">Porazit šampiony v šachách</text>
    </g>
  </g>

  <!-- Right: neumí -->
  <g transform="translate(390,60)">
    <rect width="340" height="280" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="170" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">❌ AI neumí</text>

    <g transform="translate(20,50)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
      <text x="15" y="25" font-size="20">🤔</text>
      <text x="45" y="25" font-size="12" fill="#991b1b">Skutečně rozumět světu</text>
    </g>
    <g transform="translate(20,96)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
      <text x="15" y="25" font-size="20">❤️</text>
      <text x="45" y="25" font-size="12" fill="#991b1b">Cítit emoce a empatie</text>
    </g>
    <g transform="translate(20,142)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
      <text x="15" y="25" font-size="20">🎯</text>
      <text x="45" y="25" font-size="12" fill="#991b1b">Mít vlastní cíle a motivaci</text>
    </g>
    <g transform="translate(20,188)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
      <text x="15" y="25" font-size="20">💡</text>
      <text x="45" y="25" font-size="12" fill="#991b1b">Být kreativní z vlastní vůle</text>
    </g>
    <g transform="translate(20,234)">
      <rect width="300" height="38" rx="8" fill="white" stroke="#fecaca" stroke-width="1"/>
      <text x="15" y="25" font-size="20">🧭</text>
      <text x="45" y="25" font-size="12" fill="#991b1b">Morálně se rozhodovat</text>
    </g>
  </g>
</svg>
