<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="760" height="440" rx="16" fill="#faf5ff"/>

  <text x="380" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#312e81">🧠 Jak NAO „přemýšlí"? – Od senzorů k akci</text>

  <!-- Pipeline arrows -->
  <!-- Step 1: Sensors -->
  <g transform="translate(30,60)">
    <rect width="160" height="150" rx="14" fill="white" stroke="#93c5fd" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">1. SENZORY</text>
    <text x="80" y="48" text-anchor="middle" font-size="11" fill="#64748b">(vstup informací)</text>
    <line x1="15" y1="56" x2="145" y2="56" stroke="#e2e8f0" stroke-width="1"/>

    <g transform="translate(15,65)">
      <circle cx="12" cy="10" r="10" fill="#dbeafe"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">👁️</text>
      <text x="32" y="14" font-size="10" fill="#374151">2× HD kamera</text>
    </g>
    <g transform="translate(15,90)">
      <circle cx="12" cy="10" r="10" fill="#dbeafe"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">👂</text>
      <text x="32" y="14" font-size="10" fill="#374151">4× mikrofon</text>
    </g>
    <g transform="translate(15,115)">
      <circle cx="12" cy="10" r="10" fill="#dbeafe"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">✋</text>
      <text x="32" y="14" font-size="10" fill="#374151">Dotykové senzory</text>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(195,125)">
    <polygon points="0,0 30,15 0,30" fill="#93c5fd"/>
  </g>

  <!-- Step 2: Processing -->
  <g transform="translate(230,60)">
    <rect width="160" height="150" rx="14" fill="white" stroke="#a78bfa" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#6b21a8">2. ZPRACOVÁNÍ</text>
    <text x="80" y="48" text-anchor="middle" font-size="11" fill="#64748b">(AI mozek)</text>
    <line x1="15" y1="56" x2="145" y2="56" stroke="#e2e8f0" stroke-width="1"/>

    <g transform="translate(15,65)">
      <circle cx="12" cy="10" r="10" fill="#f3e8ff"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">🧠</text>
      <text x="32" y="14" font-size="10" fill="#374151">NAOqi OS</text>
    </g>
    <g transform="translate(15,90)">
      <circle cx="12" cy="10" r="10" fill="#f3e8ff"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">🔍</text>
      <text x="32" y="14" font-size="10" fill="#374151">Rozpoznání řeči</text>
    </g>
    <g transform="translate(15,115)">
      <circle cx="12" cy="10" r="10" fill="#f3e8ff"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">⚙️</text>
      <text x="32" y="14" font-size="10" fill="#374151">Rozhodování</text>
    </g>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(395,125)">
    <polygon points="0,0 30,15 0,30" fill="#a78bfa"/>
  </g>

  <!-- Step 3: Decision -->
  <g transform="translate(430,60)">
    <rect width="160" height="150" rx="14" fill="white" stroke="#f472b6" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#be185d">3. ROZHODNUTÍ</text>
    <text x="80" y="48" text-anchor="middle" font-size="11" fill="#64748b">(co udělat?)</text>
    <line x1="15" y1="56" x2="145" y2="56" stroke="#e2e8f0" stroke-width="1"/>

    <g transform="translate(15,65)">
      <circle cx="12" cy="10" r="10" fill="#fce7f3"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">💬</text>
      <text x="32" y="14" font-size="10" fill="#374151">Odpovědět</text>
    </g>
    <g transform="translate(15,90)">
      <circle cx="12" cy="10" r="10" fill="#fce7f3"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">🚶</text>
      <text x="32" y="14" font-size="10" fill="#374151">Jít někam</text>
    </g>
    <g transform="translate(15,115)">
      <circle cx="12" cy="10" r="10" fill="#fce7f3"/>
      <text x="12" y="14" text-anchor="middle" font-size="11">🤲</text>
      <text x="32" y="14" font-size="10" fill="#374151">Chytit předmět</text>
    </g>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(595,125)">
    <polygon points="0,0 30,15 0,30" fill="#f472b6"/>
  </g>

  <!-- Step 4: Action -->
  <g transform="translate(630,60)">
    <rect width="110" height="150" rx="14" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <text x="55" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">4. AKCE!</text>
    <text x="55" y="48" text-anchor="middle" font-size="11" fill="#dcfce7">(výstup)</text>
    <line x1="10" y1="56" x2="100" y2="56" stroke="#4ade80" stroke-width="1"/>

    <text x="55" y="82" text-anchor="middle" font-size="28">🤖</text>
    <text x="55" y="108" text-anchor="middle" font-size="10" fill="white">NAO provede</text>
    <text x="55" y="122" text-anchor="middle" font-size="10" fill="white">akci!</text>
  </g>

  <!-- Example scenarios -->
  <text x="380" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#312e81">📋 Příklady: Co řekneš → co NAO udělá</text>

  <!-- Scenario 1 -->
  <g transform="translate(30,270)">
    <rect width="340" height="65" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" fill="#374151">🗣️ <tspan font-weight="700" fill="#6366f1">„Ahoj NAO!"</tspan></text>
    <text x="20" y="42" font-size="18">→</text>
    <text x="45" y="42" font-size="12" fill="#374151">🤖 NAO pozná hlas, otočí se, zamává a řekne <tspan font-weight="600">„Ahoj!"</tspan></text>
    <text x="20" y="56" font-size="9" fill="#94a3b8">Senzory: mikrofon → AI: rozpoznání řeči → Akce: gesto + řeč</text>
  </g>

  <!-- Scenario 2 -->
  <g transform="translate(390,270)">
    <rect width="340" height="65" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" fill="#374151">🗣️ <tspan font-weight="700" fill="#6366f1">„Zatanči!"</tspan></text>
    <text x="20" y="42" font-size="18">→</text>
    <text x="45" y="42" font-size="12" fill="#374151">🤖 NAO přehraje hudbu a zatančí Gangnam Style</text>
    <text x="20" y="56" font-size="9" fill="#94a3b8">Senzory: mikrofon → AI: příkaz → Akce: choreografie + zvuk</text>
  </g>

  <!-- Scenario 3 -->
  <g transform="translate(30,350)">
    <rect width="340" height="65" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" fill="#374151">👋 <tspan font-weight="700" fill="#6366f1">Ukážeš červený míček</tspan></text>
    <text x="20" y="42" font-size="18">→</text>
    <text x="45" y="42" font-size="12" fill="#374151">🤖 NAO sleduje míček očima a jde za ním</text>
    <text x="20" y="56" font-size="9" fill="#94a3b8">Senzory: kamera → AI: detekce barvy → Akce: sledování + chůze</text>
  </g>

  <!-- Scenario 4 -->
  <g transform="translate(390,350)">
    <rect width="340" height="65" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="20" y="22" font-size="12" fill="#374151">🗣️ <tspan font-weight="700" fill="#6366f1">„Kolik je 7 × 8?"</tspan></text>
    <text x="20" y="42" font-size="18">→</text>
    <text x="45" y="42" font-size="12" fill="#374151">🤖 NAO spočítá a řekne <tspan font-weight="600">„56!"</tspan></text>
    <text x="20" y="56" font-size="9" fill="#94a3b8">Senzory: mikrofon → AI: výpočet → Akce: řeč</text>
  </g>
</svg>
