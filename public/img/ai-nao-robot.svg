<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="760" height="520" rx="16" fill="#f0f4ff"/>

  <text x="380" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#312e81">🤖 Robot NAO – co všechno umí?</text>
  <text x="380" y="56" text-anchor="middle" font-size="12" fill="#6366f1">58 cm · 25 stupňů volnosti · humanoidní robot pro vzdělávání</text>

  <!-- NAO body silhouette (center) -->
  <g transform="translate(320,80)">
    <!-- Head -->
    <circle cx="60" cy="30" r="28" fill="#c7d2fe" stroke="#6366f1" stroke-width="2"/>
    <circle cx="50" cy="24" r="5" fill="#818cf8"/>
    <circle cx="70" cy="24" r="5" fill="#818cf8"/>
    <rect x="45" y="35" width="30" height="4" rx="2" fill="#818cf8"/>
    <!-- Body -->
    <rect x="35" y="58" width="50" height="55" rx="10" fill="#c7d2fe" stroke="#6366f1" stroke-width="2"/>
    <!-- Arms -->
    <rect x="0" y="62" width="35" height="14" rx="7" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="85" y="62" width="35" height="14" rx="7" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Hands -->
    <circle cx="-4" cy="69" r="8" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="124" cy="69" r="8" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Legs -->
    <rect x="38" y="113" width="18" height="40" rx="6" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="64" y="113" width="18" height="40" rx="6" fill="#a5b4fc" stroke="#6366f1" stroke-width="1.5"/>
    <!-- Feet -->
    <rect x="32" y="150" width="28" height="10" rx="4" fill="#818cf8"/>
    <rect x="60" y="150" width="28" height="10" rx="4" fill="#818cf8"/>
    <!-- Label -->
    <text x="60" y="180" text-anchor="middle" font-size="16" font-weight="800" fill="#4338ca">NAO</text>
  </g>

  <!-- Capability bubbles around NAO -->

  <!-- Top left: Vidění -->
  <g transform="translate(30,80)">
    <rect width="200" height="70" rx="14" fill="white" stroke="#93c5fd" stroke-width="2"/>
    <text x="25" y="28" font-size="22">👁️</text>
    <text x="55" y="25" font-size="12" font-weight="700" fill="#1e40af">Vidění</text>
    <text x="55" y="42" font-size="10" fill="#374151">2 HD kamery, rozpozná</text>
    <text x="55" y="56" font-size="10" fill="#374151">obličeje, tvary a barvy</text>
  </g>
  <line x1="230" y1="115" x2="320" y2="115" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Top right: Slyšení -->
  <g transform="translate(530,80)">
    <rect width="200" height="70" rx="14" fill="white" stroke="#a78bfa" stroke-width="2"/>
    <text x="25" y="28" font-size="22">👂</text>
    <text x="55" y="25" font-size="12" font-weight="700" fill="#5b21b6">Slyšení</text>
    <text x="55" y="42" font-size="10" fill="#374151">4 mikrofony, rozpozná</text>
    <text x="55" y="56" font-size="10" fill="#374151">řeč a směr zvuku</text>
  </g>
  <line x1="530" y1="115" x2="440" y2="115" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Left: Mluvení -->
  <g transform="translate(30,170)">
    <rect width="200" height="70" rx="14" fill="white" stroke="#f472b6" stroke-width="2"/>
    <text x="25" y="28" font-size="22">🗣️</text>
    <text x="55" y="25" font-size="12" font-weight="700" fill="#be185d">Mluvení</text>
    <text x="55" y="42" font-size="10" fill="#374151">Mluví česky i anglicky,</text>
    <text x="55" y="56" font-size="10" fill="#374151">2 reproduktory</text>
  </g>
  <line x1="230" y1="200" x2="320" y2="155" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Right: Pohyb -->
  <g transform="translate(530,170)">
    <rect width="200" height="70" rx="14" fill="white" stroke="#34d399" stroke-width="2"/>
    <text x="25" y="28" font-size="22">🦿</text>
    <text x="55" y="25" font-size="12" font-weight="700" fill="#059669">Pohyb</text>
    <text x="55" y="42" font-size="10" fill="#374151">25 motorů – chodí, tančí,</text>
    <text x="55" y="56" font-size="10" fill="#374151">gestikuluje, vstane sám</text>
  </g>
  <line x1="530" y1="200" x2="440" y2="155" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom capabilities row -->

  <!-- Dotek -->
  <g transform="translate(30,280)">
    <rect width="155" height="80" rx="14" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
    <text x="78" y="28" text-anchor="middle" font-size="22">✋</text>
    <text x="78" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Dotykové senzory</text>
    <text x="78" y="64" text-anchor="middle" font-size="9" fill="#374151">Hlava, ruce, nohy</text>
  </g>

  <!-- Programování -->
  <g transform="translate(200,280)">
    <rect width="155" height="80" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="78" y="28" text-anchor="middle" font-size="22">💻</text>
    <text x="78" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Programování</text>
    <text x="78" y="64" text-anchor="middle" font-size="9" fill="#374151">Python, Choregraphe</text>
  </g>

  <!-- WiFi -->
  <g transform="translate(370,280)">
    <rect width="155" height="80" rx="14" fill="#f3e8ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="78" y="28" text-anchor="middle" font-size="22">📡</text>
    <text x="78" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">Konektivita</text>
    <text x="78" y="64" text-anchor="middle" font-size="9" fill="#374151">WiFi + Ethernet</text>
  </g>

  <!-- Autonomie -->
  <g transform="translate(540,280)">
    <rect width="190" height="80" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="95" y="28" text-anchor="middle" font-size="22">🔋</text>
    <text x="95" y="48" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Autonomní provoz</text>
    <text x="95" y="64" text-anchor="middle" font-size="9" fill="#374151">Baterie ~ 90 min aktivní</text>
  </g>

  <!-- Use cases at bottom -->
  <text x="380" y="400" text-anchor="middle" font-size="14" font-weight="700" fill="#312e81">🎯 K čemu se NAO používá?</text>

  <g transform="translate(30,415)">
    <rect width="165" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-size="24">🏫</text>
    <text x="82" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">Výuka</text>
    <text x="82" y="58" text-anchor="middle" font-size="9" fill="#374151">Programování,</text>
    <text x="82" y="70" text-anchor="middle" font-size="9" fill="#374151">jazyky, matematika</text>
  </g>

  <g transform="translate(210,415)">
    <rect width="165" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-size="24">🔬</text>
    <text x="82" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">Výzkum</text>
    <text x="82" y="58" text-anchor="middle" font-size="9" fill="#374151">AI, strojové učení,</text>
    <text x="82" y="70" text-anchor="middle" font-size="9" fill="#374151">robotika</text>
  </g>

  <g transform="translate(390,415)">
    <rect width="165" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-size="24">🧩</text>
    <text x="82" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">Terapie</text>
    <text x="82" y="58" text-anchor="middle" font-size="9" fill="#374151">Pomoc dětem</text>
    <text x="82" y="70" text-anchor="middle" font-size="9" fill="#374151">s autismem</text>
  </g>

  <g transform="translate(570,415)">
    <rect width="165" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-size="24">🏆</text>
    <text x="82" y="44" text-anchor="middle" font-size="10" font-weight="700" fill="#4338ca">Soutěže</text>
    <text x="82" y="58" text-anchor="middle" font-size="9" fill="#374151">RoboCup – roboti</text>
    <text x="82" y="70" text-anchor="middle" font-size="9" fill="#374151">hrají fotbal</text>
  </g>
</svg>
