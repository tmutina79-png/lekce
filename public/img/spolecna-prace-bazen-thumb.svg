<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="400" height="225" fill="url(#bBg)"/>

  <!-- Bazén -->
  <rect x="100" y="60" width="200" height="120" rx="6" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- Voda v bazénu (částečně naplněný) -->
  <rect x="102" y="110" width="196" height="68" rx="4" fill="url(#water)"/>
  <!-- Vlnky na vodě -->
  <path d="M102,110 Q130,105 150,110 Q170,115 200,110 Q230,105 260,110 Q280,115 298,110" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.7"/>

  <!-- Trubka A (levá) -->
  <rect x="120" y="30" width="16" height="35" rx="3" fill="#334155" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="115" y="26" width="26" height="8" rx="2" fill="#3b82f6"/>
  <!-- Proud vody A -->
  <line x1="128" y1="65" x2="128" y2="108" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.7" stroke-dasharray="8,6"/>
  <text x="128" y="22" font-family="sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="bold">A</text>

  <!-- Trubka B (pravá) -->
  <rect x="264" y="30" width="16" height="35" rx="3" fill="#334155" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="259" y="26" width="26" height="8" rx="2" fill="#22c55e"/>
  <!-- Proud vody B -->
  <line x1="272" y1="65" x2="272" y2="108" stroke="#86efac" stroke-width="4" stroke-linecap="round" opacity="0.7" stroke-dasharray="8,6"/>
  <text x="272" y="22" font-family="sans-serif" font-size="11" fill="#86efac" text-anchor="middle" font-weight="bold">B</text>

  <!-- Časové popisky -->
  <rect x="88" y="42" width="22" height="16" rx="3" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="99" y="54" font-family="sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">4h</text>

  <rect x="290" y="42" width="22" height="16" rx="3" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
  <text x="301" y="54" font-family="sans-serif" font-size="9" fill="#86efac" text-anchor="middle">6h</text>

  <!-- Měřítko na bazénu -->
  <line x1="310" y1="62" x2="310" y2="178" stroke="#475569" stroke-width="1"/>
  <line x1="307" y1="62" x2="313" y2="62" stroke="#475569" stroke-width="1"/>
  <line x1="307" y1="110" x2="313" y2="110" stroke="#475569" stroke-width="1"/>
  <line x1="307" y1="178" x2="313" y2="178" stroke="#475569" stroke-width="1"/>
  <text x="320" y="92" font-family="sans-serif" font-size="8" fill="#64748b">60%</text>

  <!-- Vzorec -->
  <rect x="110" y="186" width="180" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="200" y="205" font-family="Georgia, serif" font-size="12" fill="#93c5fd" text-anchor="middle">t = 1 / (1/4 + 1/6) = 2,4 h</text>

  <!-- Nadpis -->
  <text x="200" y="16" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="bold">📐 Plnění bazénu – řešený příklad</text>

  <!-- Video badge -->
  <rect x="15" y="192" width="80" height="24" rx="6" fill="#3b82f6"/>
  <polygon points="30,199 30,211 40,205" fill="#fff"/>
  <text x="65" y="209" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
