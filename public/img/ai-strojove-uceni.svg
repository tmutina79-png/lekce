<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="760" height="400" rx="16" fill="#f0fdf4"/>

  <text x="380" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">🧠 Jak se AI učí? – Strojové učení v 5 krocích</text>

  <!-- Step 1 -->
  <g transform="translate(30,60)">
    <rect width="130" height="120" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <circle cx="65" cy="35" r="20" fill="#dcfce7"/>
    <text x="65" y="42" text-anchor="middle" font-size="18">📦</text>
    <text x="65" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">1. SBĚR DAT</text>
    <text x="65" y="88" text-anchor="middle" font-size="9" fill="#374151">Tisíce fotek,</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#374151">textů, zvuků…</text>
  </g>
  <text x="170" y="120" font-size="24" fill="#86efac">→</text>

  <!-- Step 2 -->
  <g transform="translate(185,60)">
    <rect width="130" height="120" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <circle cx="65" cy="35" r="20" fill="#dcfce7"/>
    <text x="65" y="42" text-anchor="middle" font-size="18">🏷️</text>
    <text x="65" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">2. OZNAČENÍ</text>
    <text x="65" y="88" text-anchor="middle" font-size="9" fill="#374151">"Tohle je kočka"</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#374151">"Tohle je pes"</text>
  </g>
  <text x="325" y="120" font-size="24" fill="#86efac">→</text>

  <!-- Step 3 -->
  <g transform="translate(340,60)">
    <rect width="130" height="120" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <circle cx="65" cy="35" r="20" fill="#dcfce7"/>
    <text x="65" y="42" text-anchor="middle" font-size="18">🔄</text>
    <text x="65" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">3. TRÉNINK</text>
    <text x="65" y="88" text-anchor="middle" font-size="9" fill="#374151">AI hledá vzorce</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#374151">a pravidla</text>
  </g>
  <text x="480" y="120" font-size="24" fill="#86efac">→</text>

  <!-- Step 4 -->
  <g transform="translate(495,60)">
    <rect width="130" height="120" rx="14" fill="white" stroke="#86efac" stroke-width="2"/>
    <circle cx="65" cy="35" r="20" fill="#dcfce7"/>
    <text x="65" y="42" text-anchor="middle" font-size="18">🧪</text>
    <text x="65" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">4. TESTOVÁNÍ</text>
    <text x="65" y="88" text-anchor="middle" font-size="9" fill="#374151">Ověření na</text>
    <text x="65" y="100" text-anchor="middle" font-size="9" fill="#374151">nových datech</text>
  </g>
  <text x="635" y="120" font-size="24" fill="#86efac">→</text>

  <!-- Step 5 -->
  <g transform="translate(650,60)">
    <rect width="90" height="120" rx="14" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
    <text x="45" y="45" text-anchor="middle" font-size="24">🚀</text>
    <text x="45" y="72" text-anchor="middle" font-size="10" font-weight="700" fill="white">5. HOTOVO!</text>
    <text x="45" y="88" text-anchor="middle" font-size="9" fill="white">AI funguje</text>
    <text x="45" y="100" text-anchor="middle" font-size="9" fill="white">v praxi</text>
  </g>

  <!-- Analogy section -->
  <g transform="translate(30,200)">
    <rect width="700" height="180" rx="14" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <text x="350" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">🧒 Analogie: AI jako malé dítě</text>

    <!-- Child learning steps -->
    <g transform="translate(20,50)">
      <circle cx="55" cy="30" r="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="55" y="37" text-anchor="middle" font-size="22">👶</text>
      <text x="55" y="74" text-anchor="middle" font-size="9" fill="#374151">Maminka ukáže:</text>
      <text x="55" y="86" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">"To je kočka"</text>
    </g>

    <text x="138" y="82" font-size="20" fill="#c7d2fe">→</text>

    <g transform="translate(155,50)">
      <circle cx="55" cy="30" r="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="55" y="37" text-anchor="middle" font-size="22">🐱</text>
      <text x="55" y="74" text-anchor="middle" font-size="9" fill="#374151">Vidí 100 koček</text>
      <text x="55" y="86" text-anchor="middle" font-size="9" fill="#374151">různé barvy…</text>
    </g>

    <text x="273" y="82" font-size="20" fill="#c7d2fe">→</text>

    <g transform="translate(290,50)">
      <circle cx="55" cy="30" r="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="55" y="37" text-anchor="middle" font-size="22">💡</text>
      <text x="55" y="74" text-anchor="middle" font-size="9" fill="#374151">Vytvoří model:</text>
      <text x="55" y="86" text-anchor="middle" font-size="9" fill="#374151">4 nohy, ocas…</text>
    </g>

    <text x="408" y="82" font-size="20" fill="#c7d2fe">→</text>

    <g transform="translate(425,50)">
      <circle cx="55" cy="30" r="28" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
      <text x="55" y="37" text-anchor="middle" font-size="22">✅</text>
      <text x="55" y="74" text-anchor="middle" font-size="9" fill="#374151">Novou kočku</text>
      <text x="55" y="86" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">pozná!</text>
    </g>

    <text x="543" y="82" font-size="20" fill="#c7d2fe">→</text>

    <g transform="translate(560,50)">
      <circle cx="55" cy="30" r="28" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
      <text x="55" y="37" text-anchor="middle" font-size="22">🐶</text>
      <text x="55" y="74" text-anchor="middle" font-size="9" fill="#374151">Psa nezamění</text>
      <text x="55" y="86" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">za kočku ❌</text>
    </g>

    <text x="350" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1">AI funguje stejně, jen místo 100 obrázků potřebuje miliony!</text>
  </g>
</svg>
