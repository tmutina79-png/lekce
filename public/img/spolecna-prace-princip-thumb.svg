<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="spBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="400" height="225" fill="url(#spBg)"/>

  <!-- Ozubená kola (symbolizují spolupráci) -->
  <!-- Velké kolo -->
  <g transform="translate(110, 90)" opacity="0.15">
    <circle cx="0" cy="0" r="45" fill="none" stroke="#3b82f6" stroke-width="8"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#3b82f6" stroke-width="4"/>
  </g>
  <!-- Malé kolo -->
  <g transform="translate(175, 65)" opacity="0.15">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#60a5fa" stroke-width="6"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#60a5fa" stroke-width="3"/>
  </g>

  <!-- Pracovník A -->
  <g transform="translate(80, 55)">
    <!-- Hlava -->
    <circle cx="25" cy="18" r="14" fill="#3b82f6" opacity="0.8"/>
    <text x="25" y="23" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">A</text>
    <!-- Tělo -->
    <rect x="15" y="34" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.6"/>
    <!-- Nástroj -->
    <line x1="38" y1="40" x2="55" y2="30" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="57" cy="28" r="5" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- Pracovník B -->
  <g transform="translate(235, 55)">
    <!-- Hlava -->
    <circle cx="25" cy="18" r="14" fill="#22c55e" opacity="0.8"/>
    <text x="25" y="23" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">B</text>
    <!-- Tělo -->
    <rect x="15" y="34" width="20" height="30" rx="4" fill="#22c55e" opacity="0.6"/>
    <!-- Nástroj -->
    <line x1="38" y1="40" x2="55" y2="30" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <circle cx="57" cy="28" r="5" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- Plus symbol -->
  <text x="200" y="85" font-family="sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle" font-weight="bold">+</text>

  <!-- Šipky dolů -->
  <line x1="105" y1="125" x2="200" y2="150" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="260" y1="125" x2="200" y2="150" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Vzorec uprostřed -->
  <rect x="100" y="145" width="200" height="40" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="162" font-family="Georgia, serif" font-size="13" fill="#e2e8f0" text-anchor="middle">1/t</text>
  <text x="200" y="162" font-family="Georgia, serif" font-size="13" fill="#93c5fd" text-anchor="middle">v = 1/t₁ + 1/t₂</text>

  <!-- Časy pod pracovníky -->
  <rect x="65" y="100" width="70" height="22" rx="5" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="100" y="115" font-family="sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">t₁ = 4 hod</text>

  <rect x="225" y="100" width="70" height="22" rx="5" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="260" y="115" font-family="sans-serif" font-size="10" fill="#86efac" text-anchor="middle">t₂ = 6 hod</text>

  <!-- Nadpis -->
  <text x="200" y="28" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">🤝 Princip společné práce</text>

  <!-- Spodní text -->
  <text x="200" y="210" font-family="sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Výkony pracovníků se sčítají</text>

  <!-- Video badge -->
  <rect x="305" y="192" width="80" height="24" rx="6" fill="#3b82f6"/>
  <polygon points="320,199 320,211 330,205" fill="#fff"/>
  <text x="355" y="209" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
