<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="parGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Pozadí -->
  <rect width="400" height="225" fill="url(#fBg)"/>

  <!-- Mřížka -->
  <g opacity="0.12" stroke="#94a3b8" stroke-width="0.5">
    <line x1="50" y1="30" x2="50" y2="180"/>
    <line x1="100" y1="30" x2="100" y2="180"/>
    <line x1="150" y1="30" x2="150" y2="180"/>
    <line x1="200" y1="30" x2="200" y2="180"/>
    <line x1="250" y1="30" x2="250" y2="180"/>
    <line x1="300" y1="30" x2="300" y2="180"/>
    <line x1="350" y1="30" x2="350" y2="180"/>
    <line x1="50" y1="55" x2="350" y2="55"/>
    <line x1="50" y1="80" x2="350" y2="80"/>
    <line x1="50" y1="105" x2="350" y2="105"/>
    <line x1="50" y1="130" x2="350" y2="130"/>
    <line x1="50" y1="155" x2="350" y2="155"/>
  </g>

  <!-- Osy -->
  <line x1="50" y1="180" x2="355" y2="180" stroke="#64748b" stroke-width="2"/>
  <line x1="200" y1="25" x2="200" y2="185" stroke="#64748b" stroke-width="2"/>
  <!-- Šipky os -->
  <polygon points="355,180 348,176 348,184" fill="#64748b"/>
  <polygon points="200,25 196,32 204,32" fill="#64748b"/>
  <!-- Popisky os -->
  <text x="365" y="184" font-family="sans-serif" font-size="12" fill="#94a3b8">x</text>
  <text x="206" y="28" font-family="sans-serif" font-size="12" fill="#94a3b8">y</text>

  <!-- Lineární funkce (modrá) -->
  <path d="M70,155 L330,55" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="335" y="55" font-family="sans-serif" font-size="10" fill="#3b82f6">f(x)=ax+b</text>

  <!-- Parabola (oranžová) -->
  <path d="M100,50 Q150,175 200,180 Q250,175 300,50" stroke="url(#parGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="305" y="75" font-family="sans-serif" font-size="10" fill="#f59e0b">f(x)=x²</text>

  <!-- Sinus (zelená) -->
  <path d="M70,130 C100,80 130,80 160,130 C190,180 220,180 250,130 C280,80 310,80 340,130" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="345" y="130" font-family="sans-serif" font-size="10" fill="#22c55e">sin(x)</text>

  <!-- Body na lineární -->
  <circle cx="130" cy="135" r="4" fill="#3b82f6"/>
  <circle cx="230" cy="105" r="4" fill="#3b82f6"/>

  <!-- Body na parabole -->
  <circle cx="150" cy="130" r="4" fill="#f59e0b"/>
  <circle cx="250" cy="130" r="4" fill="#f59e0b"/>

  <!-- Nadpis -->
  <text x="200" y="18" font-family="Arial, sans-serif" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">📈 Funkce – průběh a vlastnosti</text>

  <!-- Vzorec -->
  <rect x="55" y="188" width="130" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="120" y="207" font-family="Georgia, serif" font-size="13" fill="#93c5fd" text-anchor="middle">f(x) → právě jedno y</text>

  <!-- Video badge -->
  <rect x="305" y="192" width="80" height="24" rx="6" fill="#3b82f6"/>
  <polygon points="320,199 320,211 330,205" fill="#fff"/>
  <text x="355" y="209" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">VIDEO</text>
</svg>
